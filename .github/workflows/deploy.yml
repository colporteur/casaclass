name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        env:
          # Set these in: Repo → Settings → Secrets and variables → Actions → Variables
          # (Anon key is safe to expose; it's the public Supabase key.)
          VITE_SUPABASE_URL:           ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY:      ${{ vars.VITE_SUPABASE_ANON_KEY }}
          VITE_SUMMARIZE_FUNCTION_URL: ${{ vars.VITE_SUMMARIZE_FUNCTION_URL }}
          # If you use a custom domain, set repo variable VITE_BASE to '/'.
          # Otherwise leave it unset; vite.config.js defaults to '/casa-class/'.
          VITE_BASE:                   ${{ vars.VITE_BASE }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
